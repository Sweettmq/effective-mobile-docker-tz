version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: em_backend
    expose:
      - "${BACKEND_PORT}"
    networks:
      - em_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: em_nginx
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - em_network
    depends_on:
      - backend
    restart: always

networks:
  em_network:
    driver: bridge 
